name: ci-frontend

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "app-scm-examples/spike/frontend/**"
      - "app-scm-examples/spike/scripts/**"
  pull_request:
    paths:
      - "app-scm-examples/spike/frontend/**"
      - "app-scm-examples/spike/scripts/**"

concurrency:
  group: dev-digest-update-frontend-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/BacktotheBone/argocd-lab-apps/spike/frontend
          tags: |
            type=sha,format=long
            
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      
      - id: build
        uses: docker/build-push-action@v6
        with:
            context: ./app-scm-examples/spike/frontend/
            file: ./app-scm-examples/spike/frontend/Dockerfile
            push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            tags: ${{ steps.meta.outputs.tags }}
            labels: ${{ steps.meta.outputs.labels }}
            platforms: linux/amd64,linux/arm64
            cache-from: type=gha
            cache-to: type=gha,mode=max
            build-args: |
              BUILDKIT_INLINE_CACHE=1

      - name: Update deploy/frontend/values-dev.yaml with digest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Extract the image name from the tag (remove the :sha-* tag)
          IMAGE_FULL=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          echo "Image: $IMAGE_FULL"
          
          # Install tools
          sudo apt-get update && sudo apt-get install -y jq
          curl -sSL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq
          
          # Use docker/metadata-action's digest output which is the manifest list digest
          # For multi-arch builds, we need the manifest list digest, not individual platform digests
          DIGEST="${{ steps.build.outputs.digest }}"
          
          # If outputs.digest is empty (which it often is for multi-platform), 
          # extract from image@digest format in the tag
          if [[ "$IMAGE_FULL" == *"@"* ]]; then
            DIGEST=$(echo "$IMAGE_FULL" | sed 's/.*@//')
          fi
          
          if [ -z "$DIGEST" ]; then
            echo "Warning: Could not extract digest, using fallback method"
            # Fallback: use image name without tag for now, ArgoCD will pull latest
            DIGEST="latest"
          fi
          
          echo "Setting digest to: $DIGEST"
          yq -i ".image.digest = \"$DIGEST\"" app-scm-examples/spike/deploy/frontend/values-dev.yaml

      - name: Commit changes (dev auto-deploy)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add app-scm-examples/spike/deploy/frontend/values-dev.yaml
          git commit -m "ci: update frontend dev image digest"
          git pull --rebase origin main
          git push origin HEAD:main
          